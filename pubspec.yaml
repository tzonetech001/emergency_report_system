name: emergency_report_system
description: Emergency report system with Firebase backend
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.1.0
  firebase_storage: ^12.0.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2

  geolocator: ^10.1.0
  permission_handler: ^11.0.1

  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  url_launcher: ^6.3.1

  flutter_map_cancellable_tile_provider: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # - assets/images/
    # - assets/icons/